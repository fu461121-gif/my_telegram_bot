- name: Setup Miniconda
  uses: conda-incubator/setup-miniconda@v3
  with:
    python-version: '3.10'
    activate-environment: myenv
    # environment-file: environment.yml   <-- احذف هذا السطر أو علّق عليه

- name: Install dependencies
  run: |
    # مثال: ثبّت المكتبات التي تحتاجها (عدّل حسب مشروعك)
    pip install python-telegram-bot requests pytest
    # أو استخدم conda إذا أردت:
    # conda install numpy pandas -y